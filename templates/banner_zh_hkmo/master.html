<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="master.css">
</head>
<body>
  <main class="poster {{lang_class}}" style="width: {{canvas_width}}px; height: {{canvas_height}}px;">
    <section class="photo-wall" aria-label="目的地背景">
      <figure class="panel panel-hk">
        <img src="{{bg_asset}}" alt="香港维港 skyline">
      </figure>
      <figure class="panel panel-sunset">
        <img src="{{bg_asset}}" alt="中港澳城市剪影">
      </figure>
      <figure class="panel panel-castle">
        <img src="{{patch_asset_1}}" alt="香港主题乐园城堡">
      </figure>
      <figure class="panel panel-wall">
        <img src="{{patch_asset_2}}" alt="古城墙">
      </figure>
      <div class="panel-separator sep-left"></div>
      <div class="panel-separator sep-right"></div>
    </section>

    <section class="center-card" aria-label="产品信息">
      <div class="top-ribbon">
        <span>{{subtitle}}</span>
        <div class="sim-corner">
          <span>k</span>
        </div>
      </div>

      <h1>{{title}}</h1>

      <div class="sim-chip" aria-label="eSIM 卡">
        <span class="chip-lines left"></span>
        <span class="chip-label">eSIM</span>
        <span class="chip-lines right"></span>
      </div>

      <div class="service-badge" aria-label="{{cta}}">
        <div class="clock">
          <span></span>
        </div>
        <strong>{{cta}}</strong>
      </div>

      <div class="hero-cluster">
        <img src="{{hero_asset}}" class="hero-boy" alt="eSIM 卡通人物">
        <div class="phone">
          <span class="camera"></span>
          <span class="screen"></span>
        </div>
        <div class="orbit orbit-one"></div>
        <div class="orbit orbit-two"></div>
        <div class="net-icon plane">✈</div>
        <div class="net-icon wifi">◉</div>
        <div class="net-icon globe">◎</div>
        <div class="net-icon device">▯</div>
      </div>
    </section>
  </main>
</body>
</html>
