<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <link rel="stylesheet" href="master.css">
</head>
<body>
    <div class="poster {{lang_class}}" style="width: {{canvas_width}}px; height: {{canvas_height}}px;">
        <!-- 背景层 -->
        <div class="background-layer">
            <img src="{{bg_asset}}" alt="背景" class="background-image">
        </div>
        
        <!-- 主体资产层 -->
        <div class="hero-layer">
            <img src="{{hero_asset}}" alt="主体" class="hero-image">
        </div>
        
        <!-- UI信息层 -->
        <div class="ui-layer">
            <!-- 标题组件 -->
            <div class="title-block">
                <h1 class="main-title">{{title}}</h1>
                <h2 class="sub-title">{{subtitle}}</h2>
            </div>
            
            <!-- 价格组件 -->
            <div class="price-block">
                <span class="currency">{{currency}}</span>
                <span class="price">{{price}}</span>
                <span class="unit">{{unit}}</span>
            </div>
            
            <!-- 卖点卡片组件 -->
            <div class="benefit-cards">
                {{#each benefits}}
                <div class="benefit-card">
                    <span class="benefit-icon">{{icon}}</span>
                    <span class="benefit-text">{{text}}</span>
                </div>
                {{/each}}
            </div>
            
            <!-- CTA按钮组件 -->
            <div class="cta-button">
                <button class="cta-btn">{{cta}}</button>
            </div>
            
            <!-- 免责声明组件 -->
            <div class="disclaimer">
                <p>{{disclaimer}}</p>
            </div>
        </div>
        
        <!-- 文案层 -->
        <div class="copy-layer">
            <!-- 多语言文案覆盖 -->
        </div>
        
        <!-- 导出层 -->
        <div class="export-layer">
            <!-- 导出标记 -->
        </div>
    </div>
</body>
</html>
